<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jinja2 result</title>
</head>
<body>
    <h2>

        Based on the marks You have {{ results }}

        {% if results >= 50 %}
        <p>You have passed!</p>
        {% else %}
        <p>You have failed.</p>
        {% endif %}
    </h2>
</body>
</html>
