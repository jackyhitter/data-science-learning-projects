<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWI Prediction API</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .card {
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 850px;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            color: #111827;
            font-weight: 600;
            font-size: 28px;
            letter-spacing: -0.5px;
        }
        
        .header p {
            color: #6b7280;
            font-size: 14px;
            margin-top: 5px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 35px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        /* Combined input and select styling */
        input[type="number"], select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            color: #111827;
            background-color: #f9fafb;
            transition: all 0.2s ease;
            outline: none;
            cursor: pointer;
        }

        input[type="number"]:focus, select:focus {
            border-color: #6366f1;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* HIDE DEFAULT BROWSER NUMBER ARROWS */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background-color: #111827;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            background-color: #374151;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .btn:active {
            transform: translateY(0);
        }

        .result-box {
            margin-top: 30px;
            padding: 24px;
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 12px;
            text-align: center;
        }
        
        .result-box h2 {
            font-size: 18px;
            color: #166534;
            font-weight: 600;
        }
        
        .result-value {
            font-size: 32px;
            font-weight: 700;
            color: #15803d;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .input-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .input-grid {
                grid-template-columns: 1fr;
            }
        }
        /* --- Number Inputs --- */
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            color: #111827;
            background-color: #f9fafb;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: #6366f1;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* --- Custom Premium Dropdowns --- */
        select {
            width: 100%;
            padding: 12px 16px;
            padding-right: 40px; /* Extra padding so text doesn't hit the arrow */
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            color: #111827;
            background-color: #f9fafb;
            transition: all 0.2s ease;
            outline: none;
            cursor: pointer;
            
            /* 1. Nuke the default OS arrow */
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            
            /* 2. Inject a custom minimal SVG arrow */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
        }

        select:focus {
            border-color: #6366f1;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>Fire Weather Index (FWI)</h1>
            <p>Enter meteorological data to predict the risk index.</p>
        </div>
        
        <form action="{{ url_for('predict') }}" method="post">
            <div class="input-grid">
                
                <div class="input-group">
                    <label>Temperature (°C)</label>
                    <input type="number" name="Temperature" min="-20" max="60" step="any" required="required" />
                </div>

                <div class="input-group">
                    <label>Relative Humidity (%)</label>
                    <input type="number" name="RH" min="0" max="100" step="any" required="required" />
                </div>

                <div class="input-group">
                    <label>Wind Speed (km/h)</label>
                    <input type="number" name="Ws" min="0" max="150" step="any" required="required" />
                </div>

                <div class="input-group">
                    <label>Rain (mm)</label>
                    <input type="number" name="Rain" min="0" max="300" step="any" required="required" />
                </div>

                <div class="input-group">
                    <label>FFMC Index</label>
                    <input type="number" name="FFMC" min="0" max="100" step="any" required="required" />
                </div>

                <div class="input-group">
                    <label>DMC Index</label>
                    <input type="number" name="DMC" min="0" max="400" step="any" required="required" />
                </div>

                <div class="input-group">
                    <label>ISI Index</label>
                    <input type="number" name="ISI" min="0" max="100" step="any" required="required" />
                </div>

                <div class="input-group">
                    <label>Classes</label>
                    <select name="Classes" required="required">
                        <option value="" disabled selected hidden>Select Class...</option>
                        <option value="0">0 (Not Fire)</option>
                        <option value="1">1 (Fire)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Region</label>
                    <select name="Region" required="required">
                        <option value="" disabled selected hidden>Select Class...</option>
                        <option value="0">0 (Bejaia)</option>
                        <option value="1">1 (Sidi Bel-Abbes)</option>
                    </select>
                </div>

            </div>
            
            <button type="submit" class="btn">Run Prediction Model</button>
        </form>

        {% if result %}
        <div class="result-box">
            <h2>Calculated Prediction of <strong> FWI </strong></h2>
            <div class="result-value">{{ result|round(2) }}</div>
        </div>
        {% endif %}
    </div>

</body>
</html>
